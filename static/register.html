<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COMPLY — Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=Architects+Daughter&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#f2ece0; --surface:#faf6ef; --ruled:#e0d8c8; --ink:#1a1714; --green:#2a7d4f; --red:#d94f3d; --muted:#8c7e6a; --gold:#c49a0a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:"DM Mono",monospace; background:var(--bg); color:var(--ink); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem; }
    .card { background:var(--surface); border:1.5px solid var(--ruled); border-radius:16px; padding:2.5rem 2rem; width:100%; max-width:400px; }
    .logo { font-family:"Instrument Serif",serif; font-size:2.2rem; color:var(--ink); text-align:center; margin-bottom:0.3rem; }
    .logo span { color:var(--gold); font-style:italic; }
    .subtitle { font-size:0.68rem; color:var(--muted); text-align:center; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:2rem; }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-size:0.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.35rem; }
    .form-group input { width:100%; background:var(--bg); border:1.5px solid var(--ruled); border-radius:8px; padding:0.75rem 0.9rem; font-family:"DM Mono",monospace; font-size:0.85rem; color:var(--ink); outline:none; transition:border-color 0.2s; }
    .form-group input:focus { border-color:var(--ink); }
    .hint { font-size:0.65rem; color:var(--muted); margin-top:0.3rem; }
    .btn { width:100%; background:var(--ink); color:var(--surface); border:none; border-radius:8px; padding:0.9rem; font-family:"Architects Daughter",cursive; font-size:1rem; cursor:pointer; margin-top:0.5rem; transition:all 0.2s; }
    .btn:hover { background:#2d2925; transform:translateY(-1px); }
    .feedback { margin-top:0.8rem; font-size:0.75rem; text-align:center; min-height:20px; color:var(--red); }
    .switch { text-align:center; margin-top:1.5rem; font-size:0.75rem; color:var(--muted); }
    .switch a { color:var(--ink); font-weight:500; text-decoration:none; border-bottom:1px solid var(--ink); }
    .switch a:hover { color:var(--gold); border-bottom-color:var(--gold); }
    .divider { border:none; border-top:1.5px solid var(--ruled); margin:1.5rem 0; }
    .perks { display:flex; flex-direction:column; gap:0.5rem; margin-bottom:1.5rem; }
    .perk { display:flex; align-items:center; gap:0.6rem; font-size:0.72rem; color:var(--muted); }
    .perk-dot { width:6px; height:6px; background:var(--green); border-radius:50%; flex-shrink:0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">COM<span>PLY</span></div>
    <div class="subtitle">Create your free account</div>

    <div class="perks">
      <div class="perk"><div class="perk-dot"></div>Never miss a tax or license deadline</div>
      <div class="perk"><div class="perk-dot"></div>Track all compliance in one place</div>
      <div class="perk"><div class="perk-dot"></div>Free to get started</div>
    </div>

    <div class="form-group">
      <label>Business Name</label>
      <input type="text" id="business" placeholder="e.g. Sunrise Roasters LLC" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@yourbusiness.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
      <div class="hint">At least 6 characters</div>
    </div>

    <button class="btn" id="register-btn">Create Account →</button>
    <div class="feedback" id="feedback"></div>

    <hr class="divider" />
    <div class="switch">Already have an account? <a href="/login">Log in</a></div>
  </div>

  <script>
    document.getElementById("register-btn").addEventListener("click", async function() {
      var business  = document.getElementById("business").value.trim();
      var email     = document.getElementById("email").value.trim();
      var password  = document.getElementById("password").value;
      var feedback  = document.getElementById("feedback");

      if (!email || !password) {
        feedback.textContent = "Please fill in email and password.";
        return;
      }

      feedback.textContent = "Creating your account...";
      feedback.style.color = "#8c7e6a";

      var res  = await fetch("/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, password: password, business_name: business })
      });
      var data = await res.json();

      if (res.ok) {
        feedback.style.color = "#2a7d4f";
        feedback.textContent = "Account created! Redirecting...";
        window.location.href = data.redirect;
      } else {
        feedback.style.color = "#d94f3d";
        feedback.textContent = data.error;
      }
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Enter") document.getElementById("register-btn").click();
    });
  </script>
</body>
</html>
